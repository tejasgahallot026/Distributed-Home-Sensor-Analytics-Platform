services:
  - type: web
    name: home-sensor-platform
    env: python
    buildCommand: pip install -r requirements.txt && pip install gunicorn
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: DATABASE_URL
        fromDatabase:
          name: home-sensors-db
          property: connectionString
      - key: MQTT_BROKER_URL
        value: wss://mqtt.render.com:8083
      - key: SECRET_KEY
        generateValue: true
    plan: starter

databases:
  - name: home-sensors-db
    databaseName: sensors
    user: sensor_user
