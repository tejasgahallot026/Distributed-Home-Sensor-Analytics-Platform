<!DOCTYPE html>
<html>
<head>
    <title>Home Sensor Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto p-8">
        <h1 class="text-4xl font-bold mb-8">🏠 Home Sensor Analytics</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <!-- Device Status Cards -->
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-2xl font-bold mb-4">Temperature Trends (24h)</h2>
                <div id="temp-chart" style="height: 400px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Fetch and render chart data
        fetch('/api/chart-data')
            .then(response => response.json())
            .then(data => {
                const traces = [{
                    x: data.map(d => new Date(d.timestamp)),
                    y: data.map(d => d.value),
                    type: 'scatter',
                    mode: 'lines+markers',
                    name: 'Temperature (°C)'
                }];
                
                Plotly.newPlot('temp-chart', traces, {
                    title: 'Temperature Over Time',
                    xaxis: { title: 'Time' },
                    yaxis: { title: 'Temperature (°C)' }
                });
            });
    </script>
</body>
</html>
